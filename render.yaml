services:
  - type: web
    name: papermerge-web
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: papermerge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: papermerge-redis
          type: redis
      - key: ALLOWED_HOSTS
        value: "*"
    healthCheckPath: /

databases:
  - name: papermerge-db
    plan: starter
    databaseName: papermerge
    user: papermerge

services:
  - type: redis
    name: papermerge-redis
    plan: starter
